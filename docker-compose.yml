version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fasossira_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fasossira
      POSTGRES_USER: fasossira
      POSTGRES_PASSWORD: fasossira_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fasossira"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fasossira_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fasossira.dev
      PGADMIN_DEFAULT_PASSWORD: pgadmin_dev
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
